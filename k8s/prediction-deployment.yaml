apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: homevalue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      containers:
        - name: prediction-service
          image: 377002868387.dkr.ecr.us-east-1.amazonaws.com/homevalue-prediction:latest
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              value: "gsk_86BfGbvKizjopDzQveQ8WGdyb3FYnsPFDAhqMPf26"
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: homevalue
spec:
  selector:
    app: prediction-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer